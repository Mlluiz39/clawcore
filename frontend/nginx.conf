server {
    listen 80;
    server_name localhost;

    # Serve os arquivos estáticos do React (HTML, CSS, JS)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Fallback para o React Router (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API do ClawCore Backend
    location /api/ {
        # O nome 'backend' deve corresponder ao nome do serviço no docker-compose
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        
        # Headers necessários
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # OTIMIZAÇÕES PARA SSE (Server-Sent Events) - ESSENCIAL PARA O CLAWCORE
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        # Aumentar timeout para evitar queda da stream em respostas longas
        proxy_read_timeout 24h;
    }
}
